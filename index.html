<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechRepair - Assistente Virtual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 600px;
            background-color: #16213e;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* parte de cima do chat */
        .chat-header {
            background-color: #0f3460;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .icon {
            width: 40px;
            height: 40px;
            background-color: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header .info h3 {
            color: #fff;
            font-size: 16px;
        }

        .chat-header .info span {
            color: #53d769;
            font-size: 12px;
        }

        /* onde as mensagens aparecem */
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-line;
        }

        .message.bot {
            background-color: #0f3460;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background-color: #e94560;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* animacao dos tres pontinhos quando o bot ta digitando */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 14px;
            background-color: #0f3460;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #aaa;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* parte de baixo onde o usuario digita */
        .chat-input {
            display: flex;
            padding: 12px 16px;
            background-color: #0f3460;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background-color: #16213e;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .chat-input input::placeholder {
            color: #888;
        }

        .chat-input button {
            padding: 10px 18px;
            background-color: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chat-input button:hover {
            background-color: #c73650;
        }

        /* estilizando a barra de rolagem */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #333;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- cabecalho do chat -->
    <div class="chat-header">
        <div class="icon">🔧</div>
        <div class="info">
            <h3>TechRepair Bot</h3>
            <span>● Online</span>
        </div>
    </div>

    <!-- area onde aparecem as mensagens -->
    <div class="chat-messages" id="chatMessages">
        <div class="message bot">Olá! Bem-vindo à TechRepair 🔧
Como posso te ajudar?
- Abrir um chamado
- Consultar status do conserto
- Atualizar seu e-mail</div>
    </div>

    <!-- tres pontinhos quando o bot ta pensando -->
    <div class="typing-indicator" id="typingIndicator">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- campo pra digitar a mensagem -->
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
        <button id="sendBtn" onclick="enviarMensagem()">Enviar</button>
    </div>
</div>

<script>
    // url do servidor rasa pra enviar as mensagens
    const RASA_URL = "http://localhost:5005/webhooks/rest/webhook";

    // pegando os elementos da pagina
    const chatMessages = document.getElementById("chatMessages");
    const userInput = document.getElementById("userInput");
    const typingIndicator = document.getElementById("typingIndicator");

    // quando apertar enter, envia a mensagem
    userInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            enviarMensagem();
        }
    });

    // funcao que envia a mensagem pro rasa
    function enviarMensagem() {
        const texto = userInput.value.trim();

        // se ta vazio nao envia nada
        if (texto === "") return;

        // mostra a mensagem do usuario na tela
        adicionarMensagem(texto, "user");

        // limpa o campo de texto
        userInput.value = "";

        // mostra os tres pontinhos
        typingIndicator.style.display = "block";
        rolarParaBaixo();

        // manda a mensagem pro rasa pela api rest
        fetch(RASA_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                sender: "usuario_web",
                message: texto
            })
        })
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            // esconde os pontinhos
            typingIndicator.style.display = "none";

            // mostra o que o bot respondeu
            if (data.length > 0) {
                for (var i = 0; i < data.length; i++) {
                    adicionarMensagem(data[i].text, "bot");
                }
            } else {
                adicionarMensagem("Desculpe, não entendi. Pode repetir?", "bot");
            }
        })
        .catch(function(error) {
            // se deu erro, avisa o usuario
            typingIndicator.style.display = "none";
            adicionarMensagem("Erro ao conectar com o servidor. Verifique se o Rasa está rodando.", "bot");
            console.error("Erro:", error);
        });
    }

    // funcao pra colocar a mensagem na tela
    function adicionarMensagem(texto, tipo) {
        var mensagem = document.createElement("div");
        mensagem.classList.add("message", tipo);
        mensagem.textContent = texto;
        chatMessages.appendChild(mensagem);
        rolarParaBaixo();
    }

    // rola o chat pra baixo automaticamente
    function rolarParaBaixo() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>

</body>
</html>
