# arquivo de configuracao do rasa
recipe: default.v1

assistant_id: techrepair_bot

# idioma do bot (portugues)
language: pt

# pipeline de nlu - aqui configura como o bot entende as mensagens
pipeline:
  - name: WhitespaceTokenizer
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4
  - name: DIETClassifier
    epochs: 100
  - name: EntitySynonymMapper
  - name: ResponseSelector
    epochs: 100
  - name: FallbackClassifier
    threshold: 0.5
    ambiguity_threshold: 0.1

# politicas do core - define como o bot decide o que fazer
policies:
  - name: MemoizationPolicy
  - name: RulePolicy
    core_fallback_threshold: 0.4
    core_fallback_action_name: action_default_fallback
    enable_fallback_prediction: true
  - name: TEDPolicy
    max_history: 5
    epochs: 100
